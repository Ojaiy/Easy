<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EASYSHIP NG - Smart Logistics Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { 50:'#eef2ff',100:'#e0e7ff',200:'#c7d2fe',300:'#a5b4fc',400:'#818cf8',500:'#6366f1',600:'#4f46e5',700:'#4338ca',800:'#3730a3',900:'#312e81',950:'#1e1b4b' },
            accent: { 400:'#fbbf24',500:'#f59e0b',600:'#d97706' }
          },
          fontFamily: { sans: ['Inter','system-ui','sans-serif'] }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="font-sans bg-slate-50 text-slate-800 antialiased">
  <!-- Toast Container -->
  <div id="toast-container" class="fixed top-4 right-4 z-[9999] flex flex-col gap-3 max-w-sm w-full pointer-events-none"></div>

  <!-- Loading Overlay -->
  <div id="loading-overlay" class="fixed inset-0 z-[9998] bg-white/80 backdrop-blur-sm flex items-center justify-center hidden">
    <div class="flex flex-col items-center gap-4">
      <div class="loading-spinner"></div>
      <p id="loading-text" class="text-slate-600 font-medium">Loading...</p>
    </div>
  </div>

  <!-- Modal Container -->
  <div id="modal-backdrop" class="fixed inset-0 z-[9997] bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 hidden" onclick="if(event.target===this)closeModal()">
    <div id="modal-content" class="bg-white rounded-2xl shadow-2xl max-w-lg w-full max-h-[90vh] overflow-y-auto transform transition-all"></div>
  </div>

  <!-- App Shell -->
  <div id="app" class="min-h-screen flex flex-col">
    <nav id="navbar" class="sticky top-0 z-50"></nav>
    <main id="page-content" class="flex-1"></main>
    <footer id="footer"></footer>
  </div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="script.js"></script>
</body>
</html>
